name: Script Lint

on:
  push:
    branches: [main, master]
    paths:
      - '**.sh'
      - 'Makefile'
      - 'tools/semgrep-bash-security.yaml'
  pull_request:
    branches: [main, master]
    paths:
      - '**.sh'
      - 'Makefile'
      - 'tools/semgrep-bash-security.yaml'

jobs:
  script-lint:
    name: ShellCheck + Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: make shellcheck
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Run semgrep bash security rules
        run: uvx semgrep scan --config tools/semgrep-bash-security.yaml --include "*.sh" --error .
